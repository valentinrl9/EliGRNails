<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eli GR Nails | Gestión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
    <div class="container-fluid d-flex align-items-center justify-content-between">
        
        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="logo.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3567/3567015.png'">
            <span class="ms-2 d-none d-lg-inline">Eli·GR NAILS</span>
        </a>

        <div class="nav nav-pills" id="pills-tab" role="tablist">
            <button class="nav-link active btn-nav" data-bs-toggle="pill" data-bs-target="#tab-agenda">
                <i class="fa-solid fa-calendar-week"></i> <span class="d-none d-sm-inline ms-1">Agenda</span>
            </button>
            <button class="nav-link btn-nav mx-1" data-bs-toggle="pill" data-bs-target="#tab-clientes" onclick="listarClientes()">
                <i class="fa-solid fa-users"></i> <span class="d-none d-sm-inline ms-1">Clientes</span>
            </button>
            <button class="nav-link btn-nav" data-bs-toggle="pill" data-bs-target="#tab-servicios" onclick="listarServicios()">
                <i class="fa-solid fa-hand-sparkles"></i> <span class="d-none d-sm-inline ms-1">Servicios</span>
            </button>
        </div>

        <div class="d-flex align-items-center">
            <button class="btn btn-outline-gold btn-sm" onclick="descargarBackup()" title="Backup">
                <i class="fa-solid fa-cloud-arrow-down"></i>
            </button>
        </div>
    </div>
</nav>

<div class="container-fluid mt-3">
    <div class="tab-content">
        
        <div class="tab-pane fade show active" id="tab-agenda">
            <div class="row g-3">
                <div class="col-12">
                    <button class="btn btn-dark w-100 py-3 mb-3 shadow-sm fw-bold" data-bs-toggle="modal" data-bs-target="#modalCita" style="border: 1px solid var(--dorado); color: var(--dorado);">
                        <i class="fa-solid fa-plus-circle me-2"></i> AGENDAR NUEVA CITA
                    </button>
                    <div class="card border-0 shadow-sm p-2">
                        <div id="calendario"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-clientes">
            <div class="d-flex gap-2 mb-3">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
                    <input type="text" id="inputBusqueda" class="form-control border-start-0" placeholder="Buscar por nombre, tel o ciudad..." onkeyup="filtrarClientes()">
                </div>
                <button class="btn btn-dark px-4" data-bs-toggle="modal" data-bs-target="#modalNuevoCliente" onclick="prepararNuevoCliente()">
                    <i class="fa-solid fa-user-plus" style="color: var(--dorado);"></i>
                </button>
            </div>
            <div id="listaClientes" class="row g-2"></div>
        </div>

        <div class="tab-pane fade" id="tab-servicios">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="fw-bold mb-0">Carta de Servicios</h4>
                <button class="btn btn-dark btn-sm text-gold" data-bs-toggle="modal" data-bs-target="#modalNuevoServicio" onclick="prepararNuevoServicio()" style="border-color: var(--dorado);">
                    <i class="fa-solid fa-plus me-1"></i> Añadir
                </button>
            </div>
            <div class="card border-0 shadow-sm">
                <ul id="listaServicios" class="list-group list-group-flush"></ul>
            </div>
        </div>

    </div>
</div>

<div class="modal fade" id="modalNuevoCliente" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <input type="hidden" id="edit_cli_id" value="">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold" id="modalClienteTitulo">Ficha Clienta</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body pt-0">
                <div class="row g-3">
                    <div class="col-6"><label class="label-custom">Nombre</label><input type="text" id="nom" class="form-control"></div>
                    <div class="col-6"><label class="label-custom">Apellidos</label><input type="text" id="ape" class="form-control"></div>
                    <div class="col-12"><label class="label-custom">Teléfono</label><input type="tel" id="tel" class="form-control"></div>
                    <div class="col-12"><label class="label-custom">Dirección</label><input type="text" id="dir" class="form-control"></div>
                    <div class="col-4"><label class="label-custom">C.P.</label><input type="text" id="cp" class="form-control"></div>
                    <div class="col-8"><label class="label-custom">Población</label><input type="text" id="pob" class="form-control"></div>
                    <div class="col-12"><label class="label-custom">Cumpleaños</label><input type="date" id="cumple" class="form-control"></div>
                    <div class="col-12"><label class="label-custom">Observaciones Técnicas</label><textarea id="obs" class="form-control" rows="3"></textarea></div>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-success w-100 fw-bold py-2" onclick="guardarCliente()">GUARDAR DATOS</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalNuevoServicio" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0">
            <input type="hidden" id="edit_ser_id">
            <div class="modal-header border-0"><h5 class="modal-title fw-bold" id="modalServicioTitulo">Servicio</h5></div>
            <div class="modal-body">
                <div class="mb-3"><label class="label-custom">Nombre</label><input type="text" id="sNom" class="form-control"></div>
                <div class="mb-3"><label class="label-custom">Precio (€)</label><input type="number" id="sPre" class="form-control"></div>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-dark w-100" onclick="guardarServicio()">GUARDAR SERVICIO</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalCita" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-dark text-white border-0">
                <h5 class="modal-title" id="modalCitaTitulo">Nueva Cita</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="mb-3">
                    <label class="label-custom">Clienta</label>
                    <select id="selCli" class="form-select"></select>
                </div>
                <div class="mb-3">
                    <label class="label-custom">Servicio</label>
                    <select id="selSer" class="form-select"></select>
                </div>
                <div class="mb-4">
                    <label class="label-custom">Fecha y Hora</label>
                    <input type="datetime-local" id="citaFecha" class="form-control" step="900">
                </div>
                
                <div class="d-flex gap-2">
                    <button onclick="agendarCita()" class="btn btn-dark flex-grow-1 py-2">
                        CONFIRMAR EN AGENDA
                    </button>
                    <button id="btnEliminarCita" onclick="eliminarCita()" class="btn btn-outline-danger px-3">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://unpkg.com/dexie/dist/dexie.js"></script>
<script src="app.js"></script>
</body>
</html>
